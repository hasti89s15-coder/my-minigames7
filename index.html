<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شهربازی خنده‌دار هستی</title>
    <style>
        body {
            background-color: #fff9db;
            font-family: Tahoma, sans-serif;
            text-align: center;
            padding-top: 40px;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 8px 20px rgba(245, 159, 0, 0.15);
            width: 400px;
        }
        h1 {
            color: #f59f00;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #ffa94d;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .game-btn {
            background-color: #fcc419;
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
            font-weight: bold;
            transition: 0.2s;
        }
        .game-btn:hover {
            background-color: #f59f00;
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌟 شهربازیِ هستی 🌟</h1>
        <p class="subtitle">خوش‌اومدید! اینجا قراره کلی بخندیم و بازی کنیم :)</p>
        
        <a href="game1.html" class="game-btn">🎮 بازی اول: حدس عدد دیوونه</a>
        <a href="game2.html" class="game-btn">🏃‍♂️ بازی دوم: دکمه‌ی فراری</a>
        <a href="game3.html" class="game-btn">🍉 بازی سوم: تست شانس هندوانه‌ای</a>
        <a href="game4.html" class="game-btn">🎯 بازی چهارم: کلیکِ لجوج</a>
    </div>

</body>
</html>
